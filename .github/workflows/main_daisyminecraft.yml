# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - DaisyMinecraft

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout
      actions: read #This is required when using github.token for artifact metadata
      packages: write #This publishes the Minecraft server runtime image to GHCR

    env:
      MINECRAFT_SERVER_IMAGE: ghcr.io/daisyquest/daisyminecraft-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Download DaisyCloud published artifacts
        env:
          GH_TOKEN: ${{ secrets.DAISYQUEST_REPO_TOKEN || github.token }}
          DAISYCLOUD_REPOSITORY: DaisyQuest/DaisyCloud
          DAISYCLOUD_WORKFLOW: publish-packages.yml
          DAISYCLOUD_ARTIFACT_NAME: daisycloud-build-artifacts
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${DAISYCLOUD_REPOSITORY}"
          artifacts_dir="${GITHUB_WORKSPACE}/build/daisycloud-artifacts"
          artifact_zip="${GITHUB_WORKSPACE}/build/daisycloud-artifacts.zip"
          mkdir -p "${artifacts_dir}"

          auth_header=()
          if [ -n "${GH_TOKEN:-}" ]; then
            auth_header=(-H "Authorization: Bearer ${GH_TOKEN}")
          fi

          runs_json="$(mktemp)"
          if ! curl --fail --silent --show-error "${auth_header[@]}" \
              -H "Accept: application/vnd.github+json" \
              "${api}/actions/workflows/${DAISYCLOUD_WORKFLOW}/runs?status=success&per_page=1" \
              > "${runs_json}"; then
            echo "::error::Cannot read DaisyCloud workflow artifacts. Set DAISYQUEST_REPO_TOKEN with Actions read access to ${DAISYCLOUD_REPOSITORY}."
            exit 1
          fi

          run_id="$(python3 - "${runs_json}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              runs = json.load(handle).get("workflow_runs", [])
          print(runs[0]["id"] if runs else "")
          PY
          )"
          if [ -z "${run_id}" ]; then
            echo "::error::No successful ${DAISYCLOUD_WORKFLOW} run found in ${DAISYCLOUD_REPOSITORY}."
            exit 1
          fi

          artifacts_json="$(mktemp)"
          curl --fail --silent --show-error "${auth_header[@]}" \
            -H "Accept: application/vnd.github+json" \
            "${api}/actions/runs/${run_id}/artifacts?per_page=100" \
            > "${artifacts_json}"

          artifact_id="$(python3 - "${artifacts_json}" "${DAISYCLOUD_ARTIFACT_NAME}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              artifacts = json.load(handle).get("artifacts", [])
          name = sys.argv[2]
          matches = [artifact for artifact in artifacts if artifact.get("name") == name and not artifact.get("expired")]
          print(matches[0]["id"] if matches else "")
          PY
          )"
          if [ -z "${artifact_id}" ]; then
            echo "::error::Artifact ${DAISYCLOUD_ARTIFACT_NAME} was not found on DaisyCloud workflow run ${run_id}."
            exit 1
          fi

          curl --fail --location --silent --show-error "${auth_header[@]}" \
            -H "Accept: application/vnd.github+json" \
            "${api}/actions/artifacts/${artifact_id}/zip" \
            --output "${artifact_zip}"
          unzip -q -o "${artifact_zip}" -d "${artifacts_dir}"

          for module in cloud-model cloud-state cloud-provider-spi cloud-provider-daisybase; do
            if ! find "${artifacts_dir}" -name "${module}-*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" | grep -q .; then
              echo "::error::Downloaded DaisyCloud artifact is missing ${module} jar."
              exit 1
            fi
          done

      - name: Build with Gradle
        run: >
          ./gradlew build
          -Pdaisyminecraft.includeDaisyCloudComposite=false
          -Pdaisyminecraft.useDaisyCloudArtifacts=true
          -Pdaisyminecraft.daisyCloudArtifactsDir="${GITHUB_WORKSPACE}/build/daisycloud-artifacts"

      - name: Validate Minecraft server container image
        run: >
          docker build --pull
          -t "${MINECRAFT_SERVER_IMAGE}:${GITHUB_SHA}"
          -t "${MINECRAFT_SERVER_IMAGE}:latest"
          src/main/container

      - name: Publish Minecraft server container image
        if: github.ref == 'refs/heads/main'
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker push "${MINECRAFT_SERVER_IMAGE}:${GITHUB_SHA}"
          docker push "${MINECRAFT_SERVER_IMAGE}:latest"

      - name: Stage Azure deployment package
        run: |
          set -euo pipefail

          package_dir="${GITHUB_WORKSPACE}/build/azure-package"
          mkdir -p "${package_dir}"

          mapfile -t deploy_jars < <(find "${GITHUB_WORKSPACE}/build/libs" \
            -maxdepth 1 \
            -type f \
            -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            | sort)

          if [ "${#deploy_jars[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one deployable jar, found ${#deploy_jars[@]}."
            printf '%s\n' "${deploy_jars[@]}"
            exit 1
          fi

          cp "${deploy_jars[0]}" "${package_dir}/DaisyMinecraft.jar"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/build/azure-package/DaisyMinecraft.jar'

      - name: Upload Minecraft server container context
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-container
          path: '${{ github.workspace }}/build/distributions/daisyminecraft-server-container-*.zip'

  deploy:
    runs-on: ubuntu-latest
    needs: build
      
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'DaisyMinecraft'
          slot-name: 'Production'
          package: 'DaisyMinecraft.jar'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_32CA0086C4964E53BEAAE559A3221FAB }}
