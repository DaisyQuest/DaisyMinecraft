# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - DaisyMinecraft

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout
      packages: read #This is required for downloading packages from GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - name: Checkout DaisyCloud composite build
        uses: actions/checkout@v4
        with:
          repository: DaisyQuest/DaisyCloud
          path: DaisyCloud
          token: ${{ secrets.DAISYQUEST_REPO_TOKEN || github.token }}

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build with Gradle
        run: >
          ./gradlew build
          -Pdaisyminecraft.includeDaisyCloudComposite=true
          -Pdaisyminecraft.daisyCloudCompositePath="${GITHUB_WORKSPACE}/DaisyCloud"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/build/libs/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
      
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'DaisyMinecraft'
          slot-name: 'Production'
          package: '*.jar'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_32CA0086C4964E53BEAAE559A3221FAB }}
